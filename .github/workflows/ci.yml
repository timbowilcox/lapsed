name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Verify (typecheck, lint, test, build, grep:pii)
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

      - name: Unit tests
        # The RLS integration test inside packages/db skips itself when
        # Supabase credentials are not present (CI does not yet have
        # secrets configured). Unit tests in packages/{ui,shopify,db
        # encryption} run unconditionally.
        run: pnpm test

      - name: Build
        run: pnpm build

      - name: PII log guard
        run: pnpm grep:pii

  e2e:
    name: E2E (skipped until Shopify/Supabase secrets are configured)
    runs-on: ubuntu-latest
    needs: verify
    # Run only when secrets are configured. Until Tim adds them to
    # the repo's Actions secrets, this job is a no-op pass.
    if: ${{ vars.E2E_SECRETS_CONFIGURED == 'true' }}
    timeout-minutes: 25
    env:
      SHOPIFY_API_KEY: ${{ secrets.SHOPIFY_API_KEY }}
      SHOPIFY_API_SECRET: ${{ secrets.SHOPIFY_API_SECRET }}
      SHOPIFY_SCOPES: ${{ secrets.SHOPIFY_SCOPES }}
      SHOPIFY_OPTIONAL_SCOPES: ${{ secrets.SHOPIFY_OPTIONAL_SCOPES }}
      SHOPIFY_DEV_STORE: ${{ secrets.SHOPIFY_DEV_STORE }}
      SHOPIFY_APP_URL: ${{ secrets.SHOPIFY_APP_URL }}
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
      NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY }}
      SUPABASE_SECRET_KEY: ${{ secrets.SUPABASE_SECRET_KEY }}
      SUPABASE_JWT_SECRET: ${{ secrets.SUPABASE_JWT_SECRET }}
      SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
      TOKEN_ENCRYPTION_KEY: ${{ secrets.TOKEN_ENCRYPTION_KEY }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Install Playwright browsers
        run: pnpm --filter @lapsed/web exec playwright install --with-deps chromium

      - name: E2E (tour + Shopify install)
        run: pnpm test:e2e

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: apps/web/playwright-report
          retention-days: 14

      - name: Upload sprint screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sprint-02-screenshots
          path: _evidence/sprint-02/screenshots
          retention-days: 30
